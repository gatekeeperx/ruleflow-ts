name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck core (@ruleflow/dsl-core)
        run: npm run -w @ruleflow/dsl-core typecheck

      - name: Build core (@ruleflow/dsl-core)
        run: npm run -w @ruleflow/dsl-core build

      - name: Run tests (@ruleflow/dsl-tests)
        run: npm run test

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.node-version }}
          path: packages/dsl-tests/coverage
          if-no-files-found: warn
          retention-days: 7

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: packages/dsl-tests/coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

      - name: Run smoke (@ruleflow/dsl-core)
        run: npm run smoke

      - name: Build Next.js demo (@ruleflow/next-demo)
        run: npm run -w @ruleflow/next-demo build
