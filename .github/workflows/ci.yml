name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck core (@ruleflow/dsl-core)
        run: npm run -w @ruleflow/dsl-core typecheck

      - name: Build core (@ruleflow/dsl-core)
        run: npm run -w @ruleflow/dsl-core build

      - name: Run tests (@ruleflow/dsl-tests)
        run: npm run test

      - name: Ensure badges directory
        run: mkdir -p badges

      - name: Create coverage badge (local)
        uses: jaywcjlove/coverage-badges-cli@v1
        with:
          source: packages/dsl-tests/coverage/coverage-summary.json
          output: badges/coverage.svg
          label: coverage
          style: flat

      - name: Commit coverage badge
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && matrix.node-version == '20.x'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(badge): update coverage badge [skip ci]"
          file_pattern: "badges/coverage.svg"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.node-version }}
          path: packages/dsl-tests/coverage
          if-no-files-found: warn
          retention-days: 7

      - name: Upload coverage to Codecov
        if: false
        uses: codecov/codecov-action@v4
        with:
          files: packages/dsl-tests/coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
          # token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run smoke (@ruleflow/dsl-core)
        run: npm run smoke

      - name: Build Next.js demo (@ruleflow/next-demo)
        run: npm run -w @ruleflow/next-demo build
