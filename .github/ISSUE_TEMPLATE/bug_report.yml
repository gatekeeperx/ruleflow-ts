name: Bug report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Use input '...'
        3. See error '...'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. @ruleflow/dsl-core 0.1.0
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: e.g. 18.19.0
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
